<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Шашки Онлайн - C++ Сервер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="header">
                <h1>🎯 Шашки Онлайн</h1>
                <div class="connection-info" id="connectionInfo">
                    <span class="status online">🟢 Сервер подключен</span>
                </div>
            </div>
            
            <div class="game-panel">
                <div class="players-info">
                    <div class="player white-player" id="whitePlayer">
                        <div class="piece-icon white-icon"></div>
                        <span>⚪ Белые</span>
                        <div class="turn-indicator" id="whiteTurn"></div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="player black-player" id="blackPlayer">
                        <div class="piece-icon black-icon"></div>
                        <span>⚫ Черные</span>
                        <div class="turn-indicator" id="blackTurn"></div>
                    </div>
                </div>
                
                <div class="board-container">
                    <div class="board" id="board"></div>
                </div>
                
                <div class="game-controls">
                    <div class="game-status" id="gameStatus">
                        🎮 Игра началась
                    </div>
                    <button class="reset-btn" onclick="resetGame()">
                        🔄 Новая игра
                    </button>
                </div>
            </div>
            
            <div class="footer">
                <div class="players-connected">
                    👥 Игроки: 2/2
                </div>
                <div class="rules">
                    📜 Правила: Ходят по очереди, рубят через шашку
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="script.js"></script>
</body>
</html>
